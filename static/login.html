<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#010814">
<title>AUREX 3D — LOGIN</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=JetBrains+Mono:wght@300;400;500&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#FFD700;
  --gold2:#FFA500;
  --cyan:#00D4FF;
  --cyan2:#00FFF7;
  --dark:#010814;
  --dark2:#020c1b;
  --card-bg:rgba(1,8,20,0.85);
  --border:rgba(255,215,0,0.3);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--dark);cursor:none}

/* CUSTOM CURSOR */
#cursor{position:fixed;width:12px;height:12px;border-radius:50%;background:var(--gold);pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform 0.1s;box-shadow:0 0 10px var(--gold),0 0 20px var(--gold)}
#cursor-ring{position:fixed;width:32px;height:32px;border-radius:50%;border:1px solid rgba(255,215,0,0.5);pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:left 0.08s,top 0.08s}

/* SCENE */
#scene{position:fixed;inset:0;z-index:0}

/* AURORA BACKGROUND */
#aurora{position:absolute;inset:0;z-index:1}
.aurora-layer{position:absolute;inset:0;opacity:0.15}
.aurora-layer:nth-child(1){background:radial-gradient(ellipse 120% 60% at 20% 50%,#FFD700,transparent);animation:auroraDrift1 12s ease-in-out infinite alternate}
.aurora-layer:nth-child(2){background:radial-gradient(ellipse 100% 50% at 80% 40%,#00D4FF,transparent);animation:auroraDrift2 15s ease-in-out infinite alternate}
.aurora-layer:nth-child(3){background:radial-gradient(ellipse 80% 40% at 50% 80%,#FFA500,transparent);animation:auroraDrift3 18s ease-in-out infinite alternate}
@keyframes auroraDrift1{from{transform:translate(0,0) scale(1)}to{transform:translate(3%,2%) scale(1.05)}}
@keyframes auroraDrift2{from{transform:translate(0,0) scale(1)}to{transform:translate(-3%,-2%) scale(1.08)}}
@keyframes auroraDrift3{from{transform:translate(0,0) scale(1)}to{transform:translate(2%,-3%) scale(1.03)}}

/* STARS CANVAS */
#stars{position:absolute;inset:0;z-index:2}

/* TRON GRID CANVAS */
#grid{position:absolute;inset:0;z-index:3}

/* PARTICLES CANVAS */
#particles{position:absolute;inset:0;z-index:4}

/* SCANLINES */
#scanlines{position:absolute;inset:0;z-index:5;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none}

/* CORNER DECORATIONS */
.corner{position:fixed;width:60px;height:60px;z-index:20;opacity:0.6}
.corner-tl{top:20px;left:20px;border-top:1px solid var(--cyan);border-left:1px solid var(--cyan)}
.corner-tr{top:20px;right:20px;border-top:1px solid var(--cyan);border-right:1px solid var(--cyan)}
.corner-bl{bottom:20px;left:20px;border-bottom:1px solid var(--cyan);border-left:1px solid var(--cyan)}
.corner-br{bottom:20px;right:20px;border-bottom:1px solid var(--cyan);border-right:1px solid var(--cyan)}
.corner::after{content:'';position:absolute;width:6px;height:6px;background:var(--cyan);border-radius:50%;box-shadow:0 0 8px var(--cyan)}
.corner-tl::after{top:-3px;left:-3px}
.corner-tr::after{top:-3px;right:-3px}
.corner-bl::after{bottom:-3px;left:-3px}
.corner-br::after{bottom:-3px;right:-3px}

/* HUD LINES */
.hud-line-h{position:fixed;height:1px;background:linear-gradient(90deg,transparent,rgba(0,212,255,0.2),transparent);pointer-events:none;z-index:6}
.hud-line-h.top{top:80px;left:0;right:0}
.hud-line-h.bottom{bottom:80px;left:0;right:0}

/* FLOATING LABEL TOP LEFT */
#hud-label{position:fixed;top:28px;left:90px;z-index:20;font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(0,212,255,0.5);letter-spacing:3px;text-transform:uppercase}

/* STATUS BOTTOM */
#status{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:20;display:flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(0,212,255,0.6);letter-spacing:3px}
#status-dot{width:6px;height:6px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan);animation:statusPulse 2s ease-in-out infinite}
@keyframes statusPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.7)}}

/* SIGNATURE */
#signature{position:fixed;bottom:28px;right:28px;z-index:20;font-family:'JetBrains Mono',monospace;font-size:11px;color:rgba(255,215,0,0.3);letter-spacing:2px;cursor:default;transition:color 0.3s,text-shadow 0.3s}
#signature:hover{color:var(--gold);text-shadow:0 0 12px var(--gold)}

/* VERSION */
#version{position:fixed;bottom:28px;left:28px;z-index:20;font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(255,255,255,0.15);letter-spacing:2px}

/* MAIN CONTENT */
#content{position:fixed;inset:0;z-index:10;display:flex;align-items:center;justify-content:center}

/* LOGIN CARD */
#card{
  width:420px;
  background:var(--card-bg);
  border:1px solid var(--border);
  border-top:2px solid var(--gold);
  padding:48px 40px 40px;
  position:relative;
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  transform-style:preserve-3d;
  transition:transform 0.1s ease-out;
  will-change:transform;
}
#card::before{
  content:'';position:absolute;top:0;left:-100%;width:60%;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  animation:shimmer 3s ease-in-out infinite;
}
@keyframes shimmer{0%{left:-100%}100%{left:200%}}

/* CARD CORNER BRACKETS */
#card::after{
  content:'';position:absolute;inset:-1px;
  background:linear-gradient(135deg,rgba(255,215,0,0.05) 0%,transparent 50%,rgba(0,212,255,0.05) 100%);
  pointer-events:none;
}
.card-corner{position:absolute;width:12px;height:12px}
.card-corner.tl{top:-1px;left:-1px;border-top:2px solid var(--cyan);border-left:2px solid var(--cyan)}
.card-corner.tr{top:-1px;right:-1px;border-top:2px solid var(--cyan);border-right:2px solid var(--cyan)}
.card-corner.bl{bottom:-1px;left:-1px;border-bottom:2px solid var(--cyan);border-left:2px solid var(--cyan)}
.card-corner.br{bottom:-1px;right:-1px;border-bottom:2px solid var(--cyan);border-right:2px solid var(--cyan)}

/* LOGO */
#logo{text-align:center;margin-bottom:8px}
#logo-main{
  font-family:'Orbitron',sans-serif;
  font-size:48px;
  font-weight:900;
  letter-spacing:8px;
  background:linear-gradient(135deg,var(--gold) 0%,#fff 50%,var(--gold2) 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  text-shadow:none;
  display:block;
  animation:logoGlow 3s ease-in-out infinite alternate;
  position:relative;
  z-index:1;
}
@keyframes logoGlow{
  from{filter:drop-shadow(0 0 8px rgba(255,215,0,0.3))}
  to{filter:drop-shadow(0 0 20px rgba(255,215,0,0.7))}
}
#logo-sub{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  letter-spacing:6px;
  color:rgba(0,212,255,0.7);
  text-transform:uppercase;
  margin-top:4px;
  display:block;
}

/* DIVIDER */
.divider{
  width:100%;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  margin:24px 0;
  position:relative;
}
.divider::before{
  content:'◆';
  position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);
  color:var(--gold);font-size:8px;
  background:var(--card-bg);
  padding:0 8px;
}

/* WELCOME TEXT */
#welcome{
  text-align:center;
  font-family:'Rajdhani',sans-serif;
  font-size:13px;
  color:rgba(255,255,255,0.35);
  letter-spacing:3px;
  text-transform:uppercase;
  margin-bottom:28px;
}

/* BUTTONS */
.btn{
  width:100%;
  padding:14px 20px;
  border:none;
  border-radius:2px;
  font-family:'Rajdhani',sans-serif;
  font-size:14px;
  font-weight:600;
  letter-spacing:3px;
  text-transform:uppercase;
  cursor:none;
  position:relative;
  overflow:hidden;
  transition:transform 0.2s,box-shadow 0.2s;
  display:flex;align-items:center;justify-content:center;gap:10px;
  text-decoration:none;
}
.btn::before{
  content:'';position:absolute;top:0;left:-100%;width:50%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.1),transparent);
  transition:left 0.4s;
}
.btn:hover::before{left:150%}
.btn:hover{transform:translateY(-2px)}
.btn:active{transform:translateY(0)}

/* GOOGLE BTN */
#btn-google{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.15);
  color:rgba(255,255,255,0.85);
  margin-bottom:12px;
}
#btn-google:hover{
  background:rgba(255,255,255,0.1);
  border-color:rgba(255,255,255,0.3);
  box-shadow:0 4px 20px rgba(0,0,0,0.3);
}
.google-icon{width:18px;height:18px;flex-shrink:0}

/* GUEST BTN */
#btn-guest{
  background:linear-gradient(135deg,var(--gold2),var(--gold));
  color:#010814;
  font-weight:700;
}
#btn-guest:hover{
  box-shadow:0 4px 24px rgba(255,215,0,0.4),0 0 40px rgba(255,215,0,0.15);
}

/* SEPARATOR */
.sep{
  display:flex;align-items:center;gap:12px;
  margin:16px 0;
  font-family:'JetBrains Mono',monospace;
  font-size:10px;
  color:rgba(255,255,255,0.2);
  letter-spacing:2px;
}
.sep::before,.sep::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.08)}

/* RIPPLE */
.ripple{
  position:absolute;border-radius:50%;
  background:rgba(255,255,255,0.15);
  transform:scale(0);
  animation:rippleAnim 0.5s linear;
  pointer-events:none;
}
@keyframes rippleAnim{to{transform:scale(4);opacity:0}}

/* CARD ENTRY ANIMATION */
#card{animation:cardEntry 0.8s cubic-bezier(0.16,1,0.3,1) forwards}
@keyframes cardEntry{
  from{opacity:0;transform:translateY(30px) scale(0.95)}
  to{opacity:1;transform:translateY(0) scale(1)}
}

/* FLOATING DATA POINTS */
.data-point{
  position:fixed;
  font-family:'JetBrains Mono',monospace;
  font-size:9px;
  color:rgba(0,212,255,0.2);
  letter-spacing:1px;
  pointer-events:none;
  z-index:8;
  animation:dataFloat 8s ease-in-out infinite;
}
@keyframes dataFloat{
  0%,100%{opacity:0.2;transform:translateY(0)}
  50%{opacity:0.4;transform:translateY(-8px)}
}

/* ENERGY LINES */
.energy-line{
  position:fixed;
  height:1px;
  background:linear-gradient(90deg,transparent,var(--cyan),transparent);
  pointer-events:none;
  z-index:7;
  opacity:0;
  animation:energyPulse 6s ease-in-out infinite;
}
@keyframes energyPulse{
  0%,100%{opacity:0;transform:scaleX(0)}
  50%{opacity:0.3;transform:scaleX(1)}
}
</style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>

<div id="scene">
  <div id="aurora">
    <div class="aurora-layer"></div>
    <div class="aurora-layer"></div>
    <div class="aurora-layer"></div>
  </div>
  <canvas id="stars"></canvas>
  <canvas id="grid"></canvas>
  <canvas id="particles"></canvas>
  <div id="scanlines"></div>
</div>

<!-- CORNER DECORATIONS -->
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<!-- HUD LINES -->
<div class="hud-line-h top"></div>
<div class="hud-line-h bottom"></div>

<!-- HUD LABELS -->
<div id="hud-label">AUREX · NEURAL CORE</div>
<div id="version">V7.0</div>

<!-- FLOATING DATA POINTS -->
<div class="data-point" style="top:15%;left:8%;animation-delay:0s">SYS:ONLINE</div>
<div class="data-point" style="top:25%;right:10%;animation-delay:1.5s">AI:READY</div>
<div class="data-point" style="top:70%;left:6%;animation-delay:3s">3D:ACTIVE</div>
<div class="data-point" style="top:60%;right:8%;animation-delay:2s">BLDR:OK</div>
<div class="data-point" style="top:40%;left:5%;animation-delay:4s">NET:SECURE</div>
<div class="data-point" style="top:80%;right:12%;animation-delay:0.5s">GEN:READY</div>

<!-- ENERGY LINES -->
<div class="energy-line" style="top:35%;left:0;right:0;animation-delay:0s"></div>
<div class="energy-line" style="top:65%;left:0;right:0;animation-delay:3s"></div>

<!-- STATUS -->
<div id="status">
  <div id="status-dot"></div>
  <span id="status-text">STUDIO ONLINE</span>
</div>

<!-- SIGNATURE -->
<div id="signature">// Ankit raj</div>

<!-- MAIN CONTENT -->
<div id="content">
  <div id="card">
    <div class="card-corner tl"></div>
    <div class="card-corner tr"></div>
    <div class="card-corner bl"></div>
    <div class="card-corner br"></div>

    <div id="logo">
      <span id="logo-main">AUREX 3D</span>
      <span id="logo-sub">3D STUDIO · V7</span>
    </div>

    <div class="divider"></div>

    <div id="welcome">Authenticate to continue</div>

    <a href="/auth/google" id="btn-google" class="btn">
      <svg class="google-icon" viewBox="0 0 48 48">
        <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
        <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
        <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
        <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
      </svg>
      Continue with Google
    </a>

    <div class="sep">or</div>

    <a href="/" id="btn-guest" class="btn">
      Enter as Guest
    </a>
  </div>
</div>

<script>
// ── CURSOR ──────────────────────────────────────────────
const cursor = document.getElementById('cursor');
const ring = document.getElementById('cursor-ring');
let mx=window.innerWidth/2, my=window.innerHeight/2;
let rx=mx, ry=my;

document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cursor.style.left = mx + 'px';
  cursor.style.top = my + 'px';
});

function animRing() {
  rx += (mx - rx) * 0.12;
  ry += (my - ry) * 0.12;
  ring.style.left = rx + 'px';
  ring.style.top = ry + 'px';
  requestAnimationFrame(animRing);
}
animRing();

// ── STARS ────────────────────────────────────────────────
const starCanvas = document.getElementById('stars');
const sCtx = starCanvas.getContext('2d');
let stars = [];

function resizeStars() {
  starCanvas.width = window.innerWidth;
  starCanvas.height = window.innerHeight;
  stars = [];
  for (let i = 0; i < 200; i++) {
    stars.push({
      x: Math.random() * starCanvas.width,
      y: Math.random() * starCanvas.height,
      r: Math.random() * 1.5 + 0.3,
      alpha: Math.random(),
      speed: Math.random() * 0.02 + 0.005,
      phase: Math.random() * Math.PI * 2,
      px: 0, py: 0
    });
  }
}
resizeStars();
window.addEventListener('resize', resizeStars);

function drawStars(t) {
  sCtx.clearRect(0, 0, starCanvas.width, starCanvas.height);
  stars.forEach(s => {
    const a = 0.3 + 0.7 * Math.abs(Math.sin(t * s.speed + s.phase));
    sCtx.beginPath();
    sCtx.arc(s.x + s.px, s.y + s.py, s.r, 0, Math.PI * 2);
    sCtx.fillStyle = `rgba(255,255,255,${a})`;
    sCtx.fill();
  });
}

// ── TRON GRID ─────────────────────────────────────────────
const gridCanvas = document.getElementById('grid');
const gCtx = gridCanvas.getContext('2d');
let gridOffset = 0;

function resizeGrid() {
  gridCanvas.width = window.innerWidth;
  gridCanvas.height = window.innerHeight;
}
resizeGrid();
window.addEventListener('resize', resizeGrid);

function drawGrid(t, parallaxX, parallaxY) {
  const W = gridCanvas.width;
  const H = gridCanvas.height;
  gCtx.clearRect(0, 0, W, H);

  const horizon = H * 0.48 + parallaxY * 0.3;
  const vp = { x: W / 2 + parallaxX * 0.5, y: horizon };
  const cellSize = 80;
  const rows = 18;
  const cols = 24;
  gridOffset = (gridOffset + 0.4) % cellSize;

  // Grid glow
  gCtx.save();
  gCtx.shadowColor = '#00D4FF';
  gCtx.shadowBlur = 4;

  // Vertical lines (converge to vanishing point)
  for (let c = -cols; c <= cols; c++) {
    const bx = W/2 + c * (W / cols);
    const progress = Math.abs(c) / cols;
    const alpha = Math.max(0, 0.5 - progress * 0.4);

    gCtx.beginPath();
    gCtx.moveTo(vp.x, vp.y);
    gCtx.lineTo(bx, H + 20);
    gCtx.strokeStyle = `rgba(0,212,255,${alpha})`;
    gCtx.lineWidth = c === 0 ? 1.5 : 0.5;
    gCtx.stroke();
  }

  // Horizontal lines (recede into distance)
  for (let r = 0; r <= rows; r++) {
    const progress = (r + (gridOffset / cellSize)) / rows;
    const y = horizon + Math.pow(progress, 2) * (H + 20 - horizon);
    if (y < horizon) continue;

    // Width of line at this depth
    const depthT = (y - horizon) / (H - horizon);
    const lineW = W * 0.5 + depthT * W * 0.6;
    const x0 = vp.x - lineW / 2;
    const x1 = vp.x + lineW / 2;

    const alpha = depthT * 0.6;
    const isMajor = r % 3 === 0;
    gCtx.beginPath();
    gCtx.moveTo(x0, y);
    gCtx.lineTo(x1, y);
    gCtx.strokeStyle = isMajor ? `rgba(0,212,255,${alpha + 0.1})` : `rgba(0,180,220,${alpha * 0.6})`;
    gCtx.lineWidth = isMajor ? 1 : 0.4;
    gCtx.stroke();
  }

  // Center beam
  const beamAlpha = 0.15 + 0.1 * Math.sin(t * 0.001);
  const grad = gCtx.createLinearGradient(vp.x, vp.y, vp.x, H);
  grad.addColorStop(0, `rgba(0,212,255,0)`);
  grad.addColorStop(0.5, `rgba(0,212,255,${beamAlpha})`);
  grad.addColorStop(1, `rgba(0,212,255,0)`);
  gCtx.beginPath();
  gCtx.moveTo(vp.x - 2, vp.y);
  gCtx.lineTo(vp.x + 2, H);
  gCtx.strokeStyle = grad;
  gCtx.lineWidth = 4;
  gCtx.stroke();

  // Horizon glow line
  gCtx.beginPath();
  gCtx.moveTo(0, horizon);
  gCtx.lineTo(W, horizon);
  const hGrad = gCtx.createLinearGradient(0, horizon, W, horizon);
  hGrad.addColorStop(0, 'transparent');
  hGrad.addColorStop(0.3, `rgba(0,212,255,0.3)`);
  hGrad.addColorStop(0.5, `rgba(255,215,0,0.5)`);
  hGrad.addColorStop(0.7, `rgba(0,212,255,0.3)`);
  hGrad.addColorStop(1, 'transparent');
  gCtx.strokeStyle = hGrad;
  gCtx.lineWidth = 1.5;
  gCtx.shadowColor = '#FFD700';
  gCtx.shadowBlur = 12;
  gCtx.stroke();

  gCtx.restore();

  // Grid floor glow
  const floorGrad = gCtx.createLinearGradient(0, horizon, 0, H);
  floorGrad.addColorStop(0, 'rgba(0,212,255,0.04)');
  floorGrad.addColorStop(1, 'rgba(0,0,0,0)');
  gCtx.fillStyle = floorGrad;
  gCtx.fillRect(0, horizon, W, H - horizon);
}

// ── PARTICLES ─────────────────────────────────────────────
const pCanvas = document.getElementById('particles');
const pCtx = pCanvas.getContext('2d');
let particles = [];

function resizeParticles() {
  pCanvas.width = window.innerWidth;
  pCanvas.height = window.innerHeight;
  particles = [];
  for (let i = 0; i < 60; i++) {
    spawnParticle(true);
  }
}

function spawnParticle(init) {
  const isGold = Math.random() > 0.5;
  particles.push({
    x: Math.random() * pCanvas.width,
    y: init ? Math.random() * pCanvas.height : pCanvas.height + 10,
    r: Math.random() * 2 + 0.5,
    vy: -(Math.random() * 0.5 + 0.2),
    vx: (Math.random() - 0.5) * 0.3,
    alpha: Math.random() * 0.6 + 0.1,
    color: isGold ? '#FFD700' : '#00D4FF',
    life: 1
  });
}

resizeParticles();
window.addEventListener('resize', resizeParticles);

function drawParticles() {
  pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= 0.002;
    if (p.y < -10 || p.life <= 0) {
      particles.splice(i, 1);
      spawnParticle(false);
      continue;
    }
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    pCtx.fillStyle = p.color;
    pCtx.globalAlpha = p.alpha * p.life;
    pCtx.fill();
    pCtx.globalAlpha = 1;
  }
}

// ── PARALLAX ─────────────────────────────────────────────
let targetPX = 0, targetPY = 0;
let currentPX = 0, currentPY = 0;
const card = document.getElementById('card');

document.addEventListener('mousemove', e => {
  targetPX = (e.clientX / window.innerWidth - 0.5) * 30;
  targetPY = (e.clientY / window.innerHeight - 0.5) * 30;

  // Aurora parallax
  document.querySelectorAll('.aurora-layer').forEach((el, i) => {
    const factor = (i + 1) * 0.5;
    el.style.transform = `translate(${targetPX * factor * 0.2}px, ${targetPY * factor * 0.2}px)`;
  });

  // Stars parallax
  const starsShiftX = targetPX * 0.3;
  const starsShiftY = targetPY * 0.3;
  stars.forEach(s => {
    s.px = starsShiftX * (s.r / 1.5);
    s.py = starsShiftY * (s.r / 1.5);
  });

  // Card 3D tilt
  const rect = card.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const dx = (e.clientX - cx) / (rect.width / 2);
  const dy = (e.clientY - cy) / (rect.height / 2);
  card.style.transform = `perspective(800px) rotateY(${dx * 8}deg) rotateX(${-dy * 8}deg)`;
});

document.addEventListener('mouseleave', () => {
  card.style.transform = 'perspective(800px) rotateY(0deg) rotateX(0deg)';
  targetPX = 0; targetPY = 0;
});

// ── BUTTON RIPPLE ──────────────────────────────────────────
document.querySelectorAll('.btn').forEach(btn => {
  btn.addEventListener('click', function(e) {
    const ripple = document.createElement('span');
    ripple.className = 'ripple';
    const size = Math.max(this.offsetWidth, this.offsetHeight);
    const rect = this.getBoundingClientRect();
    ripple.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
    this.appendChild(ripple);
    setTimeout(() => ripple.remove(), 500);
  });
});

// ── STATUS CHECK ───────────────────────────────────────────
fetch('/health').then(r => r.json()).then(d => {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  if (d.blender) {
    dot.style.background = '#00FF88';
    dot.style.boxShadow = '0 0 8px #00FF88';
    txt.textContent = 'STUDIO ONLINE';
  }
}).catch(() => {
  document.getElementById('status-text').textContent = 'CONNECTING...';
});

// ── MAIN LOOP ─────────────────────────────────────────────
function loop(t) {
  currentPX += (targetPX - currentPX) * 0.05;
  currentPY += (targetPY - currentPY) * 0.05;

  drawStars(t);
  drawGrid(t, currentPX, currentPY);
  drawParticles();

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
